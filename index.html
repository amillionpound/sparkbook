<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2937" />
  <title>Sparkbook · 灵感簿</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- 解锁页 -->
  <div id="lock-screen" class="lock-screen">
    <div class="lock-card">
      <div class="lock-logo">💡</div>
      <h1>Sparkbook</h1>
      <p class="lock-sub">灵感簿 · 加密记事本</p>
      <input id="password" type="password" class="lock-input" placeholder="主密码" autocomplete="off" />
      <div id="lock-error" class="lock-error"></div>
      <button id="unlock-btn" class="btn btn-primary btn-block">解锁</button>
      <p class="lock-hint">忘记主密码 = 数据不可恢复。数据经 AES-256-GCM 加密后存于云端。</p>
    </div>
  </div>

  <!-- 主应用 -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <button id="menu-toggle" class="icon-btn only-mobile" title="菜单">☰</button>
      <span class="brand">💡 Sparkbook</span>
      <span id="sync-badge" class="badge">…</span>
      <span class="spacer"></span>
      <button id="lock-btn" class="icon-btn" title="锁定">🔒</button>
    </header>

    <div class="layout">
      <!-- 侧栏 -->
      <aside id="sidebar" class="sidebar">
        <nav class="type-nav" id="type-nav"></nav>
        <div class="cat-block">
          <div class="cat-head">
            <span>分类</span>
            <button id="add-cat-btn" class="mini-btn" title="新增分类">＋</button>
          </div>
          <div id="cat-list" class="cat-list"></div>
        </div>
        <div class="search-block">
          <input id="search" class="search-input" placeholder="搜索标题/正文/分类…" />
        </div>
        <div class="side-foot">
          <button id="export-btn" class="link-btn">导出</button>
          <button id="daily-btn" class="link-btn">日报</button>
        </div>
      </aside>

      <!-- 主区 -->
      <main class="main">
        <div class="main-head">
          <h2 id="view-title">全部</h2>
          <span id="view-count" class="muted"></span>
        </div>
        <div id="entry-list" class="entry-list"></div>
      </main>
    </div>

    <!-- 悬浮新增 -->
    <button id="fab" class="fab" title="新增 (N)">＋</button>
  </div>

  <!-- 编辑/新增 弹层 -->
  <div id="editor" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="editor-title">新增</h3>
        <button id="editor-close" class="icon-btn">✕</button>
      </div>
      <div class="modal-body" id="editor-body"></div>
      <div class="modal-foot">
        <span id="editor-stamps" class="muted small"></span>
        <span class="spacer"></span>
        <button id="editor-exit" class="btn">退出</button>
        <button id="editor-save" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 文本导出弹层 -->
  <div id="textout" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head"><h3>导出文本</h3><button id="textout-close" class="icon-btn">✕</button></div>
      <div class="modal-body"><textarea id="textout-area" class="textout-area"></textarea></div>
      <div class="modal-foot"><span class="spacer"></span><button id="textout-copy" class="btn btn-primary">复制</button></div>
    </div>
  </div>

  <!-- 轻提示 -->
  <div id="toast" class="toast hidden"></div>

  <script src="assets/crypto.js"></script>
  <script src="assets/store.js"></script>
  <script src="assets/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
